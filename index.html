<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="log-in">
        <h1>Smart Login System</h1>
        <div class="inputs">
            <input type="email" placeholder="Enter your email" id="lEmail">
            <input type="password" placeholder="Enter your password" id="lPass">
            <button id="log-in">Login</button>
        </div>
        <div>
            <div class="s-up">
                <p>Don’t have an account?</p>
                <button id="s-up">Sign Up</button>
            </div>
        </div>
    </div>

    <div class="sign-up close">
        <h1>Smart SignUp System</h1>
        <div class="inputs">
            <input type="text" placeholder="Enter your name" id="sName">
            <input type="email" placeholder="Enter your email" id="sEmail">
            <input type="password" placeholder="Enter your password" id="sPass">
            <p id="suc">Success</p>
            <button id="sign-up">Sign Up</button>
        </div>
        <div>
            <div class="l-in">
                <p>You have an account?</p>
                <button id="l-in">Login</button>
            </div>
        </div>
    </div>

    <div class="main close">
        <nav>
            <a href="#" >SMART LOGIN</a>
            <button id="logout">LogOut</button>
        </nav>
        <header>
            <h1 id="h1"></h1>
        </header>
    </div>
    <script src="main.js"></script>
</body>
</html>
